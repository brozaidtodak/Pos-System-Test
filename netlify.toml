# p1_807 — daily inventory snapshot for the trend chart (~9:20am MYT)
[functions."inventory-snapshot-cron"]
  schedule = "20 1 * * *"

# p1_105 — TikTok cutover ke direct API 2026-05-25. Cron 15-min activated.
[functions."tiktok-sync-cron"]
  schedule = "*/15 * * * *"

# p1_624 — Refresh active TikTok campaign snapshots + below_cost flags every 6h
[functions."tiktok-promo-sync-cron"]
  schedule = "30 */6 * * *"

# p1_624 — Refresh active Shopee discount snapshots + below_cost flags every 6h
[functions."shopee-promo-sync-cron"]
  schedule = "45 */6 * * *"

# p1_633 — Daily price-drift / below-cost sentinel (live TikTok prices vs cost+POS)
[functions."price-sentinel-cron"]
  schedule = "0 */6 * * *"

# p1_638 (#5) — Token expiry watchdog, twice daily (02:30 & 14:30 UTC).
[functions."token-watchdog-cron"]
  schedule = "30 2,14 * * *"

# p1_639 (#6) — Retry parked marketplace price-push failures (dead-letter), every 30 min.
[functions."push-retry-cron"]
  schedule = "*/30 * * * *"

# p1_640 (#7) — Config/creds preflight (env/sanity/auth), daily 03:15 UTC.
[functions."config-check-cron"]
  schedule = "15 3 * * *"

# p1_1044 — Ujian automatik Tanya AI lawan database (anti-hallucination watchdog), daily 22:45 UTC = 06:45 MYT.
[functions."ai-selftest-cron"]
  schedule = "45 22 * * *"

# p1_1062 — Ejen Jualan Dead Stock: cadang bundle utk stok tak bergerak, daily 23:15 UTC = 07:15 MYT.
[functions."deadstock-agent-cron"]
  schedule = "15 23 * * *"

# p1_1178 — Auto-tugasan jadual kerja Aliff+Farhan (timetable-driven), daily 00:00 UTC = 08:00 MYT.
[functions."jadual-auto-cron"]
  schedule = "0 0 * * *"

# p1_1180 — Auto-isi Angka Rasmi Live GMV dari TikTok Analytics API, daily 00:30 UTC = 08:30 MYT.
[functions."tiktok-live-gmv-cron"]
  schedule = "30 0 * * *"

# p1_681 (#8) — Settlement reconciliation: POS marketplace orders vs Shopee escrow + TikTok
# finance payouts. Daily 02:00 UTC (after settlements typically finalize). Writes settlement_recon.
[functions."settlement-recon-background"]
  schedule = "0 2 * * *"

# p1_98 Fasa 2D — Cron auto-sync every 15 min
[functions."shopee-sync-cron"]
  schedule = "*/15 * * * *"

# p1_293 — Marketplace stock reconcile (POS → Shopee + TikTok) every 20 min.
# p1_315 — PAUSED 2026-06-06: ~84 TikTok-mapped products have POS stock 0 while
# real stock lives on the marketplace (never stocked into POS, e.g. MX011-015).
# p1_363 — RE-ENABLED 2026-06-06 selepas stocktake Zack diaplikasi (p1_362). POS stok kini
# tepat (kiraan fizikal Zack) jadi reconcile selamat — POS = sumber kebenaran, push ke Shopee/TikTok.
[functions."marketplace-stock-cron"]
  schedule = "*/20 * * * *"

