<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>10 CAMP — Preview Peranti (Back-office)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
 *{box-sizing:border-box;margin:0;padding:0;}
 html,body{height:100%;}
 body{font-family:'Poppins',-apple-system,sans-serif;background:#101010;color:#FAF6EF;display:flex;flex-direction:column;overflow:hidden;}
 header{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:9px 16px;background:#1a1714;border-bottom:1px solid #2c2620;flex-wrap:wrap;}
 .brand{font-weight:700;font-size:14px;letter-spacing:.3px;}
 .brand b{color:#CD7C32;}
 .spacer{flex:1;}
 .seg{display:flex;background:#0c0a08;border:1px solid #2c2620;border-radius:10px;padding:3px;gap:2px;}
 .seg button{display:flex;align-items:center;gap:6px;background:none;border:0;color:#A8A29A;font:600 12.5px Poppins;padding:7px 13px;border-radius:8px;cursor:pointer;transition:all .12s;}
 .seg button.active{background:#CD7C32;color:#101010;}
 .seg button:not(.active):hover{color:#FAF6EF;}
 .tool{background:none;border:1px solid #3a342c;color:#CD7C32;font:600 12px Poppins;padding:7px 11px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
 .tool:hover{background:#241f19;}
 .tool[disabled]{opacity:.35;cursor:not-allowed;}
 .dim{font-size:11.5px;color:#8a847b;min-width:96px;text-align:right;}
 .stage{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden;padding:20px;}
 .scaler{transition:transform .18s ease;}
 .device{background:#000;overflow:hidden;position:relative;box-shadow:0 18px 60px rgba(0,0,0,.6);}
 .device.framed{border:13px solid #232323;border-radius:42px;}
 .device.desktop{border:0;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.4);}
 .device iframe{width:100%;height:100%;border:0;background:#fff;display:block;}
 svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>
<header>
 <span class="brand"><b>10 CAMP</b> &middot; Preview Peranti</span>
 <span style="font-size:11.5px;color:#8a847b;">Back-office</span>
 <span class="spacer"></span>
 <div class="seg" id="seg">
 <button data-dev="desktop" class="active"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg> Desktop</button>
 <button data-dev="tablet"><svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M12 18h.01"/></svg> Tablet</button>
 <button data-dev="phone"><svg viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M12 18h.01"/></svg> Phone</button>
 </div>
 <button class="tool" id="rotate" disabled><svg viewBox="0 0 24 24"><path d="M2 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M22 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg> Putar</button>
 <span class="dim" id="dim">Penuh</span>
</header>
<div class="stage" id="stage">
 <div class="scaler" id="scaler">
 <div class="device desktop" id="device">
 <iframe id="frame" src="https://www.10camp.com/" title="Back-office preview"></iframe>
 </div>
 </div>
</div>
<script>
 var SIZES = { desktop:null, tablet:{w:834,h:1112}, phone:{w:390,h:844} };
 var current = 'desktop', landscape = false;
 var device = document.getElementById('device');
 var scaler = document.getElementById('scaler');
 var stage  = document.getElementById('stage');
 var dimEl  = document.getElementById('dim');
 var rotateBtn = document.getElementById('rotate');

 function apply(){
 var s = SIZES[current];
 device.className = 'device' + (current==='desktop' ? ' desktop' : ' framed');
 if(!s){ // desktop — penuh stage
 device.style.width='100%'; device.style.height='100%';
 scaler.style.transform='none';
 dimEl.textContent='Penuh';
 rotateBtn.disabled=true;
 return;
 }
 var w = landscape ? s.h : s.w;
 var h = landscape ? s.w : s.h;
 device.style.width = w+'px';
 device.style.height = h+'px';
 dimEl.textContent = w+' x '+h;
 rotateBtn.disabled=false;
 // skala supaya muat dalam stage (tolak padding + tebal bingkai)
 var availW = stage.clientWidth - 40, availH = stage.clientHeight - 40;
 var totalW = w + 26, totalH = h + 26; // 13px border x2
 var scale = Math.min(availW/totalW, availH/totalH, 1);
 scaler.style.transform = 'scale(' + scale + ')';
 }
 document.getElementById('seg').addEventListener('click', function(e){
 var b = e.target.closest('button'); if(!b) return;
 current = b.getAttribute('dev') || b.getAttribute('data-dev');
 landscape = false;
 [].forEach.call(this.querySelectorAll('button'), function(x){ x.classList.toggle('active', x===b); });
 apply();
 });
 rotateBtn.addEventListener('click', function(){ if(current!=='desktop'){ landscape=!landscape; apply(); } });
 window.addEventListener('resize', apply);
 apply();
</script>
</body>
</html>
