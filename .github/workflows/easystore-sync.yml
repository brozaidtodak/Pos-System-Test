name: EasyStore → POS Sync (15-min backup)

# Backup polling layer in case the webhook is paused/failed.
# Runs orders-only sync every 15 minutes. Idempotent — already-imported
# orders are skipped via metadata.easystore_order_id dedup check.
#
# To trigger manually: Actions tab → "EasyStore → POS Sync" → Run workflow

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:           # manual trigger button in GitHub UI

concurrency:
  group: easystore-sync
  cancel-in-progress: false    # let running sync finish before next tick

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run orders-only sync
        env:
          EASYSTORE_TOKEN: ${{ secrets.EASYSTORE_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python3 scripts/easystore_sync.py --orders-only

      - name: Report sync timestamp to Supabase
        if: success()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          TOKEN = os.environ['SUPABASE_ACCESS_TOKEN']
          REF = 'asehjdnfzoypbwfeazra'
          API = f'https://api.supabase.com/v1/projects/{REF}/database/query'

          # Upsert into a single-row sync_status table so the POS UI can read
          # "last successful sync" without GitHub API access.
          SQL = """
          CREATE TABLE IF NOT EXISTS public.sync_status (
            source       text PRIMARY KEY,
            last_run_at  timestamptz NOT NULL,
            actor        text,
            note         text
          );
          INSERT INTO public.sync_status (source, last_run_at, actor, note)
          VALUES ('easystore_cron', now(), 'github_actions', 'orders-only sync OK')
          ON CONFLICT (source) DO UPDATE
            SET last_run_at = excluded.last_run_at,
                actor       = excluded.actor,
                note        = excluded.note;
          """
          req = urllib.request.Request(API,
              data=json.dumps({'query': SQL}).encode(),
              headers={'Authorization': f'Bearer {TOKEN}',
                       'Content-Type': 'application/json',
                       'User-Agent': 'easystore-cron/1.0'},
              method='POST')
          print(urllib.request.urlopen(req, timeout=30).read().decode()[:500])
          PY
