<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>10 CAMP — Paparan Serentak</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
 *{box-sizing:border-box;margin:0;padding:0;}
 html,body{height:100%;}
 body{font-family:'Poppins',-apple-system,sans-serif;background:#101010;color:#FAF6EF;display:flex;flex-direction:column;overflow:hidden;}
 header{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:9px 16px;background:#1a1714;border-bottom:1px solid #2c2620;}
 header .brand{font-weight:700;font-size:14px;letter-spacing:.3px;}
 header .brand b{color:#CD7C32;}
 header .spacer{flex:1;}
 header .hint{font-size:11.5px;color:#8a847b;}
 .stage{flex:1;display:flex;min-height:0;}
 /* Kiri — back-office */
 .pane-office{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid #2c2620;}
 .pane-label{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:#A8A29A;background:#15120f;}
 .pane-label .dot{width:8px;height:8px;border-radius:50%;background:#CD7C32;}
 .pane-office iframe{flex:1;width:100%;border:0;background:#fff;}
 /* Kanan — phone */
 .pane-phone{flex:0 0 460px;display:flex;flex-direction:column;align-items:center;background:#0c0a08;}
 .pane-phone .pane-label{align-self:stretch;justify-content:center;}
 .phone-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;min-height:0;width:100%;}
 .phone{width:394px;height:100%;max-height:840px;border:11px solid #232323;border-radius:40px;overflow:hidden;background:#000;box-shadow:0 14px 40px rgba(0,0,0,.55);position:relative;}
 .phone iframe{width:100%;height:100%;border:0;background:#fff;}
 .reload{background:none;border:1px solid #3a342c;color:#CD7C32;font:600 11px Poppins;padding:4px 10px;border-radius:8px;cursor:pointer;}
 .reload:hover{background:#241f19;}
 @media(max-width:1100px){ .pane-phone{flex-basis:380px;} .phone{width:340px;} }
</style>
</head>
<body>
<header>
 <span class="brand"><b>10 CAMP</b> &middot; Paparan Serentak</span>
 <span class="spacer"></span>
 <span class="hint">Back-office (laptop) + App staf (phone) &mdash; hidup serentak</span>
</header>
<div class="stage">
 <section class="pane-office">
 <div class="pane-label"><span class="dot"></span> Back-office &mdash; paparan laptop
 <span style="flex:1"></span>
 <button class="reload" onclick="document.getElementById('fOffice').src=document.getElementById('fOffice').src">Muat semula</button>
 </div>
 <iframe id="fOffice" src="https://www.10camp.com/" title="Back-office"></iframe>
 </section>
 <aside class="pane-phone">
 <div class="pane-label"><span class="dot"></span> App staf &mdash; paparan phone
 <span style="flex:1"></span>
 <button class="reload" onclick="document.getElementById('fPhone').src=document.getElementById('fPhone').src">Muat semula</button>
 </div>
 <div class="phone-wrap">
 <div class="phone">
 <iframe id="fPhone" src="https://www.10camp.com/?posapp=1#staff" title="App staf"></iframe>
 </div>
 </div>
 </aside>
</div>
</body>
</html>
